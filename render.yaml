services:
  # バックエンドAPIサーバー
  - type: web
    name: dental-system-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: dental-system-db
          property: connectionString
      - key: LINE_CHANNEL_SECRET
        sync: false   # Renderダッシュボードで手動設定
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://dental-system-frontend.onrender.com  # フロントのURL

  # フロントエンド（静的サイト）
  - type: web
    name: dental-system-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://dental-system-api.onrender.com

databases:
  - name: dental-system-db
    databaseName: dental_system
    user: dental_admin
    plan: free
